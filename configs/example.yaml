# Sprint Scribe — EM Configuration Template
# Copy this file and rename it to your own name, e.g. configs/alex.yaml

name: "Your Name"
email: "you@vendasta.com"

# Jira project keys your teams work on
jira_projects:
  - PROJ1
  - PROJ2

# Default project for creating new tickets
create_project: PROJ1

# GitHub repos to scan for PRs (within your org). Leave empty to scan the whole org.
github_repos:
  - repo-one
  - repo-two

# Your teams — maps each Jira display name to a GitHub username.
# display_name is the friendly name used in chat + digest (e.g. "Team Apollo"),
# the YAML key is the Jira/board project key (e.g. PROJ1).
teams:
  PROJ1:
    display_name: "Team Apollo"
    members:
      "Developer One": "github-id-1"
      "Developer Two": "github-id-2"
  PROJ2:
    display_name: "Team Atlas"
    members:
      "Developer Three": "github-id-3"
      "Developer Four": "github-id-4"

# Exclude these people (e.g. managers) from workload insights and reviewer suggestions
exclude_from_workload:
  - "Your Name"
