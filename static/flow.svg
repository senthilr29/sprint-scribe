<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4f46e5"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="12" fill="#fafafa"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" font-weight="500" letter-spacing="1.5">HOW IT WORKS</text>

  <!-- Step 1: User Question -->
  <rect x="30" y="70" width="120" height="60" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1" filter="url(#shadow)"/>
  <text x="90" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" font-weight="500">User asks</text>
  <text x="90" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1e293b" font-weight="600">a question</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="100" x2="190" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Step 2: Sprint Scribe -->
  <rect x="198" y="60" width="140" height="80" rx="12" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="268" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff" font-weight="700">Sprint Scribe</text>
  <text x="268" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c7d2fe">AI Agent (GPT-4o)</text>
  <text x="268" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a5b4fc">understands intent</text>

  <!-- Arrow 2 -->
  <line x1="338" y1="100" x2="378" y2="100" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

  <!-- Step 3: Calls Tools -->
  <rect x="386" y="70" width="120" height="60" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="1" filter="url(#shadow)"/>
  <text x="446" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4f46e5" font-weight="500">Calls tools</text>
  <text x="446" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6366f1">Jira, GitHub, etc.</text>

  <!-- Downward arrow from tools -->
  <line x1="446" y1="130" x2="446" y2="175" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

  <!-- Step 4: Cross-references -->
  <rect x="356" y="183" width="180" height="60" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="1" filter="url(#shadow)"/>
  <text x="446" y="209" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4f46e5" font-weight="600">Cross-references data</text>
  <text x="446" y="227" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6366f1">Jira tickets + PRs + reviews</text>

  <!-- Arrow back left -->
  <line x1="356" y1="213" x2="316" y2="213" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

  <!-- Step 5: AI Synthesizes -->
  <rect x="166" y="183" width="150" height="60" rx="12" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="241" y="209" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" font-weight="600">AI synthesizes</text>
  <text x="241" y="226" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#c7d2fe">patterns, risks, insights</text>

  <!-- Arrow down -->
  <line x1="241" y1="243" x2="241" y2="280" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 6: Output -->
  <rect x="141" y="288" width="200" height="60" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="241" y="314" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#065f46" font-weight="700">Synthesized Insight</text>
  <text x="241" y="333" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#059669">Actionable, context-rich answer</text>

  <!-- Step numbers -->
  <circle cx="42" cy="65" r="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="42" y="69" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" font-weight="600">1</text>

  <circle cx="210" cy="55" r="10" fill="#4f46e5"/>
  <text x="210" y="59" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">2</text>

  <circle cx="398" cy="65" r="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/>
  <text x="398" y="69" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5" font-weight="600">3</text>

  <circle cx="524" cy="178" r="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/>
  <text x="524" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5" font-weight="600">4</text>

  <circle cx="304" cy="178" r="10" fill="#4f46e5"/>
  <text x="304" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">5</text>

  <circle cx="153" cy="283" r="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="153" y="287" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#059669" font-weight="600">6</text>

  <!-- Example callout -->
  <rect x="370" y="300" width="200" height="56" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="470" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" font-weight="500">EXAMPLE</text>
  <text x="470" y="334" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">"How's the sprint going?"</text>
  <text x="470" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#10b981">-> risks, blockers, progress</text>

  <!-- Streamlit badge -->
  <text x="300" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#cbd5e1">Powered by Streamlit + Function Calling</text>
</svg>