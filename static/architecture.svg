  </pattern>
  <rect width="720" height="440" fill="url(#grid)" rx="16"/>

  <!-- Column labels -->
  <text x="95" y="34" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" font-weight="600" letter-spacing="2">DATA SOURCES</text>
  <line x1="40" y1="42" x2="150" y2="42" stroke="#e2e8f0" stroke-width="1"/>

  <text x="622" y="34" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94a3b8" font-weight="600" letter-spacing="2">CAPABILITIES</text>
  <line x1="560" y1="42" x2="685" y2="42" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ===== DATA SOURCES (Left) ===== -->

