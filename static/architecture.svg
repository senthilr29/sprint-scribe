  <path d="M475 200 C505 200 510 293 540 293" fill="none" stroke="url(#line-r)" stroke-width="1.8" opacity="0.7"/>
  <path d="M475 215 C505 215 510 347 540 347" fill="none" stroke="url(#line-r)" stroke-width="1.8" opacity="0.7"/>

  <!-- Connection dots -->
  <circle cx="177" cy="93" r="3" fill="#818cf8" opacity="0.6"/>
  <circle cx="177" cy="171" r="3" fill="#818cf8" opacity="0.6"/>
  <circle cx="177" cy="249" r="3" fill="#818cf8" opacity="0.6"/>
  <circle cx="177" cy="327" r="3" fill="#818cf8" opacity="0.6"/>

  <circle cx="540" cy="77" r="3" fill="#34d399" opacity="0.8"/>
  <circle cx="540" cy="131" r="3" fill="#34d399" opacity="0.8"/>
  <circle cx="540" cy="185" r="3" fill="#34d399" opacity="0.8"/>
  <circle cx="540" cy="239" r="3" fill="#34d399" opacity="0.8"/>
  <circle cx="540" cy="293" r="3" fill="#34d399" opacity="0.8"/>
