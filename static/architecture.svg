  <path d="M475 165 C505 165 510 131 540 131" fill="none" stroke="url(#line-r)" stroke-width="1.8" opacity="0.7"/>
  <path d="M475 175 C505 175 510 185 540 185" fill="none" stroke="url(#line-r)" stroke-width="1.8" opacity="0.7"/>
