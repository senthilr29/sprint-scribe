  <text x="556" y="298" font-family="Inter, system-ui, sans-serif" font-size="13">🐛</text>
  <text x="574" y="298" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#065f46" font-weight="600">Log Ticket / Bug</text>

  <rect x="540" y="326" width="165" height="42" rx="10" fill="#ffffff" stroke="#d1fae5" stroke-width="1.5" filter="url(#ds)"/>
  <text x="556" y="352" font-family="Inter, system-ui, sans-serif" font-size="13">💬</text>
  <text x="574" y="352" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#065f46" font-weight="600">Notify Team</text>

