  <text x="50" y="96" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#ffffff" font-weight="700">J</text>
  <text x="76" y="86" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b" font-weight="600">Jira</text>
  <text x="76" y="100" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="#94a3b8">Tickets · Sprints · Boards</text>

