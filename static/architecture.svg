  <rect x="32" y="150" width="36" height="36" rx="8" fill="#24292f"/>
  <text x="50" y="174" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#ffffff" font-weight="700">G</text>
  <text x="76" y="164" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b" font-weight="600">GitHub</text>
