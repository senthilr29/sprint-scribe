  <rect x="120" y="395" width="62" height="20" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="0.5"/>
  <text x="151" y="409" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4f46e5" font-weight="600">Python</text>

  <rect x="190" y="395" width="62" height="20" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="0.5"/>
  <text x="221" y="409" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4f46e5" font-weight="600">FastAPI</text>

  <rect x="260" y="395" width="80" height="20" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="0.5"/>
  <text x="300" y="409" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4f46e5" font-weight="600">OpenAI GPT-4o</text>

